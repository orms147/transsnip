<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TransSnip · Redesign</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="popup.css" />
  <link rel="stylesheet" href="overlays.css" />
  <link rel="stylesheet" href="settings.css" />
  <link rel="stylesheet" href="system.css" />
  <link rel="stylesheet" href="onboarding.css" />
  <link rel="stylesheet" href="empty.css" />
  <link rel="stylesheet" href="about.css" />

  <style>
    /* Add Noto Sans JP as a fallback after Inter so Japanese characters
       render with metric-correct glyphs instead of falling back to default
       browser fonts (which can be jarringly tall and misaligned next to
       Latin text). Applied to both dark and light variants. */
    .t-cobalt, .t-cobalt-light {
      --font-source: 'Inter', 'Noto Sans JP', system-ui, sans-serif;
    }
    .t-cobalt .mock-h1, .t-cobalt-light .mock-h1 {
      font-family: 'Inter', 'Noto Serif JP', sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script
    src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"
  ></script>

  <!-- Design canvas starter (host bridge) -->
  <script type="text/babel" src="design-canvas.jsx"></script>

  <!-- Tokens (themes + icons + shared helpers) MUST load before surfaces -->
  <script type="text/babel" src="tokens.jsx"></script>

  <!-- Surfaces -->
  <script type="text/babel" src="surface-popup.jsx"></script>
  <script type="text/babel" src="surface-overlays.jsx"></script>
  <script type="text/babel" src="surface-settings.jsx"></script>
  <script type="text/babel" src="surface-system.jsx"></script>
  <script type="text/babel" src="surface-onboarding.jsx"></script>
  <script type="text/babel" src="surface-empty.jsx"></script>
  <script type="text/babel" src="surface-about.jsx"></script>

  <!-- App entry -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
